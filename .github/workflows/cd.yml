name: CD – Build & Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "vite.config.ts"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Upload static files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/"
          target: "/tmp/frontend-release"

      - name: Activate new static files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/deploy/frontend/releases/${{ github.sha }}"
            CURRENT_LINK="/home/deploy/frontend/current"

            mkdir -p /home/deploy/frontend/releases
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            cp -a /tmp/frontend-release/dist/. "$RELEASE_DIR/"
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            rm -rf /tmp/frontend-release

      - name: Ensure nginx serves current release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cat <<'EOF' | sudo tee /etc/nginx/conf.d/default.conf > /dev/null
            server {
                listen 80;
                server_name _;

                root /home/deploy/frontend/current;
                index index.html;

                server_tokens off;
                gzip on;
                gzip_vary on;
                gzip_min_length 1024;
                gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;

                location /v1/api/ {
                    proxy_pass http://${{ vars.BACKEND_PRIVATE_IP != '' && vars.BACKEND_PRIVATE_IP || secrets.BACKEND_PRIVATE_IP }}:8080/v1/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_connect_timeout 5s;
                    proxy_send_timeout 30s;
                    proxy_read_timeout 60s;
                }

                location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                    expires 1y;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                    access_log off;
                }

                location = /index.html {
                    add_header Cache-Control "no-store, max-age=0";
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF
            sudo nginx -t
            sudo nginx -s reload

      - name: Health check
        run: |
          sleep 5
          RESPONSE=$(curl --fail --silent --max-time 10 "http://${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}")

          if echo "$RESPONSE" | grep -q "Welcome to nginx"; then
            echo "Health check failed: default nginx page is still being served." >&2
            exit 1
          fi

          echo "Site is up"
