name: CD – Build & Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "vite.config.ts"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Upload static files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/"
          target: "/tmp/frontend-release"

      - name: Activate new static files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/deploy/frontend/releases/${{ github.sha }}"
            CURRENT_LINK="/home/deploy/frontend/current"

            mkdir -p /home/deploy/frontend/releases
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            cp -a /tmp/frontend-release/dist/. "$RELEASE_DIR/"
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            rm -rf /tmp/frontend-release

      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --max-time 10 "http://${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}" \
            && echo "Site is up" \
            || (echo "Health check failed" && exit 1)
