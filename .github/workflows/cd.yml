name: CD – Build & Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy to public EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: /v1/api
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Package dist
        run: tar -czf dist.tar.gz -C dist .

      - name: Upload bundle to public EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.BASTION_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          source: dist.tar.gz
          target: /tmp

      - name: Atomic swap into /var/www/frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.BASTION_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            STAGE=$(mktemp -d /tmp/frontend-XXXX)
            tar -xzf /tmp/dist.tar.gz -C "$STAGE"
            rsync -a --delete "$STAGE"/ /var/www/frontend/
            rm -rf "$STAGE" /tmp/dist.tar.gz
            sudo nginx -t && sudo systemctl reload nginx
